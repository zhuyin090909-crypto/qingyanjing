const readCaptureShots=()=>{
  try{

      .filter(s=>s&&s.runId===CAPTURE_RUN_ID&&s.frame&&s.capturedAt);
  }

};
const hasAllCaptureShots=(shots)=>REQUIRED_CAPTURE_IDS.every(id=>shots.some(s=>s.id===id));
const callQualityApi=async(shots)=>{
  const response=await fetch(QUALITY_API_URL,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({shots:shots.map(({id,label,mode,frame,capturedAt})=>({id,label,mode,frame,capturedAt}))})
  });
  const data=await response.json().catch(()=>null);
  if(!response.ok||!data){
    throw new Error(data?.summary||'后端质检接口不可用，不能生成报告。');
  }
  return data;
};
const inspectCapturedShot=async(shot)=>{
  if(!shot||!shot.frame)return {status:'fail',label:'未采集',desc:'没有读取到真实摄像头画面，不能用于生成报告。'};
  if(shot.mode==='tongue'){
    return {status:'review',label:'需人工复核',desc:'舌照真假、偏色、过曝和舌面是否清楚，前端无法可靠判断；正式版必须交给后端模型或人工复核。'};
  }
  if(!('FaceDetector' in window)){
    return {status:'review',label:'需人工复核',desc:'当前浏览器不支持前端人脸检测，不能自动确认这张是否为真人面部照。'};
  }
  try{
    const img=new Image();
    img.src=shot.frame;
    await new Promise((resolve,reject)=>{img.onload=resolve;img.onerror=reject;});
    const detector=new FaceDetector({fastMode:true,maxDetectedFaces:2});
    const faces=await detector.detect(img);
    if(!faces||faces.length===0)return {status:'fail',label:'未识别真人面部',desc:'没有检测到清晰人脸，可能是胡乱拍、遮挡、离太远或画面不是面部。请重拍。'};
    if(faces.length>1)return {status:'fail',label:'多人/干扰画面',desc:'画面里不止一张脸，无法作为本人的单次肤况观察依据。请重拍。'};
    return {status:'pass',label:'面部可用',desc:'检测到单人面部。仍需后端继续复核清晰度、角度、遮挡、美颜和翻拍风险。'};
  }catch(e){
    return {status:'review',label:'需人工复核',desc:'前端检测失败，不能自动确认照片真实性；正式版应进入后端质检或人工复核。'};
  }
};

function CameraScreen({nav}){
  const videoRef=React.useRef(null);
  const [cameraStatus,setCameraStatus]=React.useState('idle');
  const [cameraError,setCameraError]=React.useState('');
  const [shotIndex,setShotIndex]=React.useState(0);
  const [shots,setShots]=React.useState([]);
  const shotPlan=[
    {id:'front',mode:'face',label:'正面照',prompt:'正脸看镜头，下颚线完整入框',hint:'用于识别左右脸、下颚线和额头分布',sample:CAMERA_SAMPLE_IMAGES.selfieSkincare,pos:'42% 38%'},
    {id:'left',mode:'face',label:'左45°',prompt:'向右轻转，露出左脸和下颚线',hint:'用于核对左颊、太阳穴和下颚线红肿',sample:CAMERA_SAMPLE_IMAGES.selfieSide,pos:'45% 42%'},
    {id:'right',mode:'face',label:'右45°',prompt:'向左轻转，露出右脸和下颚线',hint:'用于核对右颊、鼻翼和闭口区域',sample:CAMERA_SAMPLE_IMAGES.selfieClose,pos:'46% 36%'},
    {id:'tongue',mode:'tongue',label:'舌面照',prompt:'舌头自然伸平，不开美颜不偏色',hint:'舌象只作辅助，偏色/失焦会被排除',sample:null,pos:'center'},
  ];
  const currentShot=shotPlan[shotIndex];
  const mode=currentShot.mode;
  React.useEffect(()=>{
    sessionStorage.removeItem(QUALITY_SESSION_KEY);
    sessionStorage.setItem(CAPTURE_SESSION_KEY,'[]');
  },[]);
  const requestCamera=async()=>{
    setCameraError('');
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      setCameraStatus('error');
      setCameraError('当前浏览器不支持调用摄像头，请在手机浏览器或微信内置浏览器中打开。');
      return;
    }
    try{
      setCameraStatus('requesting');
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
      if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
      setCameraStatus('ready');
    }catch(e){
      setCameraStatus('error');
      setCameraError('未获得摄像头权限。请在浏览器设置中允许访问摄像头后重试。');
    }
  };
  React.useEffect(()=>()=>{const stream=videoRef.current?.srcObject;if(stream)stream.getTracks().forEach(t=>t.stop());},[]);
  const grabFrame=()=>{
    const video=videoRef.current;
    if(!video||!video.videoWidth||!video.videoHeight)return null;
    try{
      const canvas=document.createElement('canvas');
      canvas.width=240;
      canvas.height=Math.round(240*(video.videoHeight/video.videoWidth));
      const ctx=canvas.getContext('2d');
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      return canvas.toDataURL('image/jpeg',0.72);
    }catch(e){
      return null;
    }
  };
  const captureShot=()=>{
    if(cameraStatus!=='ready'){requestCamera();return;}
    const frame=grabFrame();
    if(!frame){
      setCameraStatus('error');
      setCameraError('没有读取到真实摄像头画面，不能记录这一张。请重新开启摄像头后再拍。');
      return;
    }
    const captured={...currentShot,runId:CAPTURE_RUN_ID,capturedAt:new Date().toISOString(),frame};
    const nextShots=[...shots.filter(s=>s.id!==currentShot.id),captured];
    setShots(nextShots);
    sessionStorage.setItem(CAPTURE_SESSION_KEY,JSON.stringify(nextShots));
    sessionStorage.removeItem(QUALITY_SESSION_KEY);
    if(shotIndex<shotPlan.length-1){
      setShotIndex(shotIndex+1);
    }else{
      setTimeout(()=>nav('quality'),180);
    }
  };
  const retakeCurrent=()=>{
    const nextShots=shots.filter(s=>s.id!==currentShot.id);
    setShots(nextShots);
    sessionStorage.setItem(CAPTURE_SESSION_KEY,JSON.stringify(nextShots));
    sessionStorage.removeItem(QUALITY_SESSION_KEY);
  };
  return(
    <div style={{height:'100%',background:'#000',position:'relative',overflow:'hidden'}}>
      <video ref={videoRef} playsInline muted style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:cameraStatus==='ready'?0.72:0,zIndex:1,transform:'scaleX(-1)'}}/>
      <div style={{position:'absolute',inset:0,backgroundImage:'linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px)',backgroundSize:'28px 28px'}}/>
      {/* Corners */}
      {[{t:12,l:12,d:'M0 18L0 0L18 0'},{t:12,r:12,d:'M18 0L18 18L0 18'},{b:68,l:12,d:'M0 0L0 18L18 18'},{b:68,r:12,d:'M18 18L18 0L0 0'}].map(({t,l,r,b,d},i)=>(
        <div key={i} style={{position:'absolute',top:t,left:l,right:r,bottom:b,zIndex:4}}>
          <svg width="18" height="18" viewBox="0 0 18 18"><path d={d} stroke="rgba(255,255,255,0.5)" strokeWidth="1.5" fill="none"/></svg>
        </div>
      ))}
      <div style={{position:'absolute',top:42,left:18,right:18,zIndex:7}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:7,marginBottom:10}}>
          {shotPlan.map((s,i)=>(
            <div key={s.id} style={{height:32,borderRadius:999,border:`1px solid ${i===shotIndex?'rgba(255,255,255,0.72)':shots.find(x=>x.id===s.id)?'rgba(80,255,140,0.42)':'rgba(255,255,255,0.12)'}`,background:i===shotIndex?'rgba(255,255,255,0.18)':shots.find(x=>x.id===s.id)?'rgba(80,255,140,0.10)':'rgba(255,255,255,0.04)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:MONO,fontSize:8,color:i===shotIndex?'#fff':shots.find(x=>x.id===s.id)?'rgba(80,255,140,0.85)':'rgba(255,255,255,0.38)',letterSpacing:'0.06em'}}>
              {shots.find(x=>x.id===s.id)?'✓ ':''}{s.label}
            </div>
          ))}
        </div>
        <div style={{fontFamily:MONO,fontSize:8,color:'rgba(255,255,255,0.42)',letterSpacing:'0.16em',textAlign:'center'}}>必须完成 3 张面部角度 + 1 张舌面照</div>
      </div>
      {/* Face / tongue guide */}
      <div style={{position:'absolute',top:'15%',left:'50%',transform:'translateX(-50%)',width:mode==='face'?220:174,height:mode==='face'?290:236,border:'1px solid rgba(255,255,255,0.3)',borderRadius:mode==='face'?'50%':'42% 42% 48% 48%',zIndex:3}}>
        <div style={{position:'absolute',top:'50%',left:-32,right:-32,height:1,background:'rgba(255,255,255,0.1)'}}/>
        <div style={{position:'absolute',left:'50%',top:-24,bottom:-24,width:1,background:'rgba(255,255,255,0.1)'}}/>
      </div>
      {/* Top data */}
      <div style={{position:'absolute',top:10,left:0,right:0,display:'flex',justifyContent:'center',gap:28,zIndex:5,fontFamily:MONO,fontSize:9,letterSpacing:'0.18em'}}>
        <span style={{color:'rgba(255,255,255,0.35)'}}>SKIN·DETECT</span>
        <span style={{color:'rgba(80,255,140,0.8)'}}>● LIVE</span>
        <span style={{color:'rgba(255,255,255,0.35)'}}>CHECK·READY</span>
      </div>
      {/* Prompt */}
      <div style={{position:'absolute',top:'62%',left:'50%',transform:'translateX(-50%)',zIndex:5}}>
        <div style={{padding:'7px 20px',border:'1px solid rgba(255,255,255,0.15)',fontFamily:MONO,fontSize:10,color:'rgba(255,255,255,0.45)',letterSpacing:'0.12em',whiteSpace:'nowrap'}}>{currentShot.prompt}</div>
      </div>
      <div style={{position:'absolute',top:'65%',left:0,right:0,display:'flex',justifyContent:'center',gap:20,zIndex:5,fontFamily:MONO,fontSize:9}}>
        <span style={{color:'rgba(80,255,140,0.7)'}}>● 光线充足</span>
        <span style={{color:'rgba(255,255,255,0.3)'}}>面部居中</span>
        <span style={{color:'rgba(255,255,255,0.3)'}}>正面朝前</span>
      </div>
      {cameraStatus!=='ready'&&(
        <div style={{position:'absolute',left:24,right:24,top:'38%',zIndex:8,background:'rgba(0,0,0,0.68)',border:'1px solid rgba(255,255,255,0.16)',borderRadius:12,padding:'15px 16px',textAlign:'center'}}>
          <div style={{fontFamily:'-apple-system,sans-serif',fontSize:15,color:'#fff',fontWeight:800,marginBottom:7}}>需要开启摄像头权限</div>
          <div style={{fontFamily:'-apple-system,sans-serif',fontSize:12,color:'rgba(255,255,255,0.58)',lineHeight:1.55,marginBottom:12}}>{cameraError||'需要连续拍摄正面、左45°、右45°和舌面照。照片不清会重拍；舌照只作辅助，偏色/过曝/失焦会排除。'}</div>

        </div>

      {/* Bottom */}
      <div style={{position:'absolute',bottom:8,left:0,right:0,padding:'0 28px',zIndex:5,display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>

function QualityGateScreen({nav}){
  const [checking,setChecking]=React.useState(true);
  const [qualityResults,setQualityResults]=React.useState({});
  const [qualitySummary,setQualitySummary]=React.useState('');
  const capturedShots=readCaptureShots();
  const allRequired=hasAllCaptureShots(capturedShots);
  React.useEffect(()=>{
    let alive=true;
    setChecking(true);
    sessionStorage.removeItem(QUALITY_SESSION_KEY);
    (async()=>{
      if(!hasAllCaptureShots(capturedShots)){
        if(alive){
          setQualityResults({});
          setQualitySummary('采集不完整，缺少关键照片，不能生成报告。');
          setChecking(false);
        }
        return;
      }
      let next={};
      let summary='';
      try{
        const apiResult=await callQualityApi(capturedShots);
        next=apiResult.results||{};
        summary=apiResult.summary||'后端质检完成。';
      }catch(e){
        summary=e.message||'后端质检接口不可用，不能生成报告。';
        next=Object.fromEntries(REQUIRED_CAPTURE_IDS.map(id=>[id,{status:'fail',label:'质检失败',desc:summary}]));
      }
      if(alive){
        setQualityResults(next);
        setQualitySummary(summary);
        setChecking(false);
      }
    })();
    return()=>{alive=false;};
  },[]);
  const getResult=(id)=>{
    if(!capturedShots.some(s=>s.id===id))return {status:'fail',label:'未采集',desc:'请返回拍照页补拍这一项，否则不能生成本次报告。'};
    return qualityResults[id]||{status:'review',label:'检查中',desc:'正在审核这张照片是否可用于本次观察。'};
  };
  const allPassed=allRequired&&REQUIRED_CAPTURE_IDS.every(id=>qualityResults[id]?.status==='pass');
  const checks=[
    {id:'front',name:'正面照'},
    {id:'left',name:'左45°'},
    {id:'right',name:'右45°'},
    {id:'tongue',name:'舌面照'},
  ];
  const passQuality=()=>{
    if(!allPassed)return;
    sessionStorage.setItem(QUALITY_SESSION_KEY,'1');
    nav('analyzing');
  };
  return(
    <div style={{minHeight:'100%',background:C.bg,display:'flex',flexDirection:'column'}}>
      <NavBar title="图片质检" onBack={()=>nav('camera')}/>
      <div style={{flex:1,padding:'28px 24px 24px',overflowY:'auto'}}>
        <Kicker>PHOTO QUALITY GATE</Kicker>
        <h2 style={{fontFamily:SERIF,fontSize:38,fontWeight:300,fontStyle:'italic',color:C.ink,lineHeight:1.12,margin:'8px 0 12px'}}>先审核照片，<br/><span style={{color:C.accent,fontWeight:600}}>再生成报告</span></h2>
        <p style={{fontFamily:'-apple-system,sans-serif',fontSize:13,color:C.sub,lineHeight:1.65,margin:'0 0 18px'}}>
          后端会确认真人面部、拍摄角度、光线、清晰度、遮挡、美颜和舌照真实性。任一关键照片不合格时，应提示重拍，不进入报告。
        </p>

        <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'14px 16px',marginBottom:14}}>
          {checks.map((c,i)=>{
            const result=getResult(c.id);
            const ok=result.status==='pass';
            const review=result.status==='review';
            return(

function AnalyzingScreen({nav}){
  const [step,setStep]=React.useState(0);
  const steps=['读取4张采集图…','复核质检通过项…','分析红肿分布…','比对问答与舌象…','生成参考结果…'];
  React.useEffect(()=>{
    if(sessionStorage.getItem(QUALITY_SESSION_KEY)!=='1'||!hasAllCaptureShots(readCaptureShots())){
      nav('quality');
      return;
    }
    const t=setInterval(()=>setStep(s=>{if(s>=4){clearInterval(t);setTimeout(()=>nav('report'),600);return 4;}return s+1;}),700);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{height:'100%',background:'#0C0C0B',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:32,padding:'40px 32px'}}>

        <div style={{position:'absolute',left:0,right:0,top:`${(step/4)*80+10}%`,height:2,background:'linear-gradient(90deg,transparent,rgba(184,115,64,0.8),transparent)',transition:'top 0.6s ease'}}/>
        {/* Dots */}
        {[[60,50],[120,45],[90,120],[70,140],[115,115]].map(([x,y],i)=>(
          <div key={i} style={{position:'absolute',left:x,top:y,width:5,height:5,borderRadius:'50%',
            background:i<=step?C.accent:'rgba(255,255,255,0.1)',transition:'background 0.3s'}}/>
        ))}
      </div>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:MONO,fontSize:9,color:C.mute,letterSpacing:'0.2em',marginBottom:14}}>AI · 肤况观察中</div>

            padding:'4px 0',transition:'color 0.3s',display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}>
            {i<step&&<svg width="12" height="10" viewBox="0 0 12 10"><path d="M1 5L4 8L11 1" stroke={C.accent} strokeWidth="1.5" strokeLinecap="round"/></svg>}

            {s}

        ))}
      </div>
    </div>
  );
}

function QuizScreen({nav,setSyndrome}){

      <NavBar title={`倾向自测 ${q+1}/${QUIZ.length}`} onBack={()=>q>0?setQ(q-1):nav('quiz-entry')}/>

  const [method,setMethod]=React.useState('wechat');
  const [phone,setPhone]=React.useState('');
  const [code,setCode]=React.useState('');
  const [sentCode,setSentCode]=React.useState('');
  const [countdown,setCountdown]=React.useState(0);
  const [error,setError]=React.useState('');
  const [loading,setLoading]=React.useState(false);
  const [user,setUser]=React.useState(()=>{try{return JSON.parse(localStorage.getItem('qingyanjing-user')||'null');}catch(e){return null;}});
  React.useEffect(()=>{
    if(countdown<=0)return;
    const t=setTimeout(()=>setCountdown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[countdown]);
  const saveUser=(nextUser)=>{
    localStorage.setItem('qingyanjing-user',JSON.stringify(nextUser));
    setUser(nextUser);
  };
  React.useEffect(()=>{
    const qs=new URLSearchParams(window.location.search);
    const codeFromWechat=qs.get('code');
    if(!user&&codeFromWechat&&qs.get('state')==='qingyanjing_login'){
      saveUser({type:'wechat',nickname:'微信用户',avatar:'微',openid:'oauth_pending',wechatCode:codeFromWechat,loginAt:new Date().toISOString()});
    }
  },[]);
  const startWechatLogin=()=>{
    setError('');
    if(LOGIN_CONFIG.wechatAppId){
      const redirect=encodeURIComponent(LOGIN_CONFIG.redirectUri);
      window.location.href=`https://open.weixin.qq.com/connect/oauth2/authorize?appid=${LOGIN_CONFIG.wechatAppId}&redirect_uri=${redirect}&response_type=code&scope=snsapi_userinfo&state=qingyanjing_login#wechat_redirect`;
      return;
    }
    setLoading(true);
    setTimeout(()=>{
      saveUser({type:'wechat',nickname:'微信用户',avatar:'微',openid:'demo_openid_'+Date.now(),loginAt:new Date().toISOString()});
      setLoading(false);
    },650);
  };
  const sendSmsCode=()=>{
    const clean=phone.replace(/\s/g,'');
    if(!/^1[3-9]\d{9}$/.test(clean)){setError('请输入正确的11位手机号');return;}
    setError('');
    setPhone(clean);
    setSentCode(LOGIN_CONFIG.demoCode);
    setCountdown(60);
  };
  const verifyPhoneLogin=()=>{
    const clean=phone.replace(/\s/g,'');
    if(!/^1[3-9]\d{9}$/.test(clean)){setError('请输入正确的11位手机号');return;}
    if(!sentCode){setError('请先获取验证码');return;}
    if(code.trim()!==sentCode){setError(`验证码不正确，原型测试码：${LOGIN_CONFIG.demoCode}`);return;}
    saveUser({type:'phone',phone:clean,nickname:clean.replace(/^(\d{3})\d{4}(\d{4})$/,'$1****$2'),loginAt:new Date().toISOString()});
  };
  const logout=()=>{
    localStorage.removeItem('qingyanjing-user');
    setUser(null);
    setCode('');
    setSentCode('');
  };
  const benefits=[
    ['保存检测记录','登录后保留每次面部照、舌诊照、问答结果和趋势分数'],
    ['同步付费权益','更换设备后仍可查看已解锁的19.9完整报告'],
    ['生成复测对比','同角度对比红肿、闭口、痘印面积变化，避免凭感觉判断'],
  ];
  return(
    <div style={{minHeight:'100%',background:C.bg}}>
      <NavBar title="登录" onBack={()=>nav('home')}/>
      <div style={{padding:'30px 24px'}}>
        <Kicker>ACCOUNT</Kicker>
        <h2 style={{fontFamily:SERIF,fontSize:38,fontWeight:300,fontStyle:'italic',color:C.ink,lineHeight:1.15,margin:'8px 0 12px'}}>把每次检测<br/><span style={{fontWeight:600,color:C.accent}}>连续记录下来</span></h2>
        <p style={{fontFamily:'-apple-system,sans-serif',fontSize:13,color:C.sub,lineHeight:1.65,margin:'0 0 18px'}}>登录后保存报告、同步19.9付费权益和生成复测对比。当前页面已可本地跑通；正式上线时把微信 AppID 和短信接口填入配置即可接真实系统。</p>
        {user?(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'16px',marginBottom:18}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
              <div style={{width:42,height:42,borderRadius:'50%',background:user.type==='wechat'?'#07C160':C.accent,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'-apple-system,sans-serif',fontWeight:800}}>{user.type==='wechat'?'微':'手'}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:'-apple-system,sans-serif',fontSize:15,color:C.ink,fontWeight:800}}>{user.nickname}</div>
                <div style={{fontFamily:MONO,fontSize:9,color:C.mute,letterSpacing:'0.08em',marginTop:3}}>{user.type==='wechat'?'WECHAT AUTHORIZED':'PHONE VERIFIED'}</div>
              </div>
            </div>
            <button onClick={()=>nav('home')} style={{width:'100%',height:46,background:C.ink,borderRadius:7,fontFamily:MONO,fontSize:10,color:C.bg,letterSpacing:'0.14em',fontWeight:700,marginBottom:8}}>进入清颜镜</button>
            <button onClick={logout} style={{width:'100%',height:38,fontFamily:'-apple-system,sans-serif',fontSize:13,color:C.mute}}>退出当前账号</button>
          </div>
        ):(
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:'14px 16px',marginBottom:18}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
              {[
                ['wechat','微信登录'],
                ['phone','手机登录'],
              ].map(([id,label])=>(
                <button key={id} onClick={()=>{setMethod(id);setError('');}} style={{height:38,borderRadius:7,background:method===id?C.ink:C.card2,color:method===id?C.bg:C.ink,fontFamily:'-apple-system,sans-serif',fontSize:13,fontWeight:750}}>{label}</button>
              ))}
            </div>
            {method==='wechat'?(
              <React.Fragment>
                <button onClick={startWechatLogin} disabled={loading} style={{width:'100%',height:50,background:'#07C160',borderRadius:8,fontFamily:'-apple-system,sans-serif',fontSize:15,color:'#fff',fontWeight:750,marginBottom:10,opacity:loading?0.72:1}}>

function App(){
  const params=new URLSearchParams(window.location.search);
  const initialScreen=params.get('screen')||'home';
  const [screen,setScreen]=React.useState(initialScreen);
  const [syndrome,setSyndrome]=React.useState('C');
  const nav=(s)=>setScreen(s);
  const tab=(t)=>{
    if(t==='home')setScreen('home');
    else if(t==='diagnose')setScreen('diagnose-tab');
    else if(t==='plan')setScreen('plan');
    else if(t==='discover')setScreen('discover');
    else if(t==='content')setScreen('content');
  };

  const darkScreens=['camera','analyzing','tea'];
  const isDark=darkScreens.includes(screen);

  const renderScreen=()=>{
    switch(screen){
      case 'home':         return <HomeScreen nav={nav} tab={tab}/>;
      case 'camera':       return <CameraScreen nav={nav}/>;
      case 'quality':      return <QualityGateScreen nav={nav}/>;
      case 'analyzing':    return <AnalyzingScreen nav={nav}/>;
      case 'report':       return <ReportScreen nav={nav} syndrome={syndrome}/>;
      case 'quiz-entry':   return <QuizEntryScreen nav={nav}/>;
      case 'quiz':         return <QuizScreen nav={nav} setSyndrome={setSyndrome}/>;
      case 'tcm-result':   return <TcmResultScreen nav={nav} syndrome={syndrome}/>;
      case 'tea':          return <TeaScreen nav={nav} syndrome={syndrome}/>;
      case 'plan':         return <PlanScreen nav={nav} tab={tab}/>;
      case 'discover':     return <DiscoverScreen nav={nav} tab={tab}/>;
      case 'login':        return <LoginScreen nav={nav}/>;
      case 'share':        return <ShareScreen nav={nav} syndrome={syndrome}/>;
      case 'diagnose-tab': return <DiagnoseTabScreen nav={nav} tab={tab}/>;
      case 'content':      return <ContentScreen nav={nav} tab={tab} syndrome={syndrome}/>;
      default:             return <HomeScreen nav={nav} tab={tab}/>;
    }
  };

  return <IosFrame dark={isDark} time="9:41" bat={88}>{renderScreen()}</IosFrame>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
